name: Lifetime Bot Automation

on:
  schedule:
    - cron: '17 12 * * 0-4'  # 7:17 AM CDT (summer, UTC-5) — 2h43m buffer before 10 AM CT target
    - cron: '17 13 * * 0-4'  # 7:17 AM CST (winter, UTC-6) — 2h43m buffer before 10 AM CT target
  workflow_dispatch:  # Allows manual trigger
    inputs:
        env:
          description: "Environment to deploy in"
          required: true
          default: "dev"
          type: choice
          options:
            - dev
            - prod
        runner:
          description: "GitHub-hosted runner for manual runs"
          required: true
          default: "macos-latest"
          type: choice
          options:
            - macos-latest
            - ubuntu-latest
            - windows-latest

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      should_run: ${{ steps.dst-check.outputs.should_run }}
    steps:
      - name: Check DST and determine correct schedule
        id: dst-check
        run: |
          CURRENT_TZ=$(TZ='America/Chicago' date '+%Z')
          CRON="${{ github.event.schedule }}"
          echo "=== Workflow Timing ==="
          echo "Cron trigger:       $CRON"
          echo "Actual start (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Actual start (CT):  $(TZ='America/Chicago' date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "======================"
          if [ "$CRON" = "17 12 * * 0-4" ] && [ "$CURRENT_TZ" = "CST" ]; then
            echo "Skipping: CDT schedule triggered during CST"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          elif [ "$CRON" = "17 13 * * 0-4" ] && [ "$CURRENT_TZ" = "CDT" ]; then
            echo "Skipping: CST schedule triggered during CDT"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Correct schedule for $CURRENT_TZ — proceeding"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  run-bot:
    runs-on: ${{ github.event_name == 'schedule' && 'macos-latest' || inputs.runner }}
    needs: check-schedule
    if: always() && (github.event_name != 'schedule' || needs.check-schedule.outputs.should_run == 'true')
    environment: ${{ github.event_name == 'schedule' && 'prod' || inputs.env }}
    steps:
      - name: Deploying in selected environment
        run: echo "Deploying in ${{ github.event_name == 'schedule' && 'prod' || inputs.env }} on ${{ github.event_name == 'schedule' && 'macos-latest' || inputs.runner }}"

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install Dependencies
        run: |
          uv pip install --system -e .

      - name: Create .env File
        run: |
          echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}" >> .env
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env
          echo "EMAIL_RECEIVER=${{ secrets.EMAIL_RECEIVER }}" >> .env
          echo "SMTP_SERVER=${{ secrets.SMTP_SERVER }}" >> .env
          echo "SMTP_PORT=\"${{ secrets.SMTP_PORT }}\"" >> .env
          echo "LIFETIME_USERNAME=${{ secrets.LIFETIME_USERNAME }}" >> .env
          echo "LIFETIME_PASSWORD=${{ secrets.LIFETIME_PASSWORD }}" >> .env
          echo "LIFETIME_CLUB_NAME=${{ vars.LIFETIME_CLUB_NAME }}" >> .env
          echo "AUTH_MODE=direct" >> .env
          echo "HEADLESS=${{ vars.HEADLESS }}" >> .env
          echo "RUN_ON_SCHEDULE=${{ vars.RUN_ON_SCHEDULE }}" >> .env
          echo "TARGET_CLASS=${{ vars.TARGET_CLASS }}" >> .env
          echo "TARGET_INSTRUCTOR=${{ vars.TARGET_INSTRUCTOR }}" >> .env
          echo "TARGET_DATE=${{ vars.TARGET_DATE }}" >> .env
          echo "START_TIME=${{ vars.START_TIME }}" >> .env
          echo "END_TIME=${{ vars.END_TIME }}" >> .env
          echo "NOTIFICATION_METHOD=${{ vars.NOTIFICATION_METHOD }}" >> .env
          echo "TARGET_LOCAL_TIME=${{ vars.TARGET_LOCAL_TIME }}" >> .env
          echo "TIMEZONE=${{ vars.TIMEZONE }}" >> .env
          echo "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" >> .env
          echo "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" >> .env
          echo "TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}" >> .env
          echo "SMS_NUMBER=${{ secrets.SMS_NUMBER }}" >> .env

      - name: Run Lifetime Bot
        run: python -m lifetime_bot
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          LIFETIME_USERNAME: ${{ secrets.LIFETIME_USERNAME }}
          LIFETIME_PASSWORD: ${{ secrets.LIFETIME_PASSWORD }}
          LIFETIME_CLUB_NAME: ${{ vars.LIFETIME_CLUB_NAME }}
          AUTH_MODE: direct
          HEADLESS: ${{ vars.HEADLESS }}
          RUN_ON_SCHEDULE: ${{ vars.RUN_ON_SCHEDULE }}
          TARGET_CLASS: ${{ vars.TARGET_CLASS }}
          TARGET_INSTRUCTOR: ${{ vars.TARGET_INSTRUCTOR }}
          TARGET_DATE: ${{ vars.TARGET_DATE }}
          START_TIME: ${{ vars.START_TIME }}
          END_TIME: ${{ vars.END_TIME }}
          NOTIFICATION_METHOD: ${{ vars.NOTIFICATION_METHOD }}
          TARGET_LOCAL_TIME: ${{ vars.TARGET_LOCAL_TIME }}
          TIMEZONE: ${{ vars.TIMEZONE }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          SMS_NUMBER: ${{ secrets.SMS_NUMBER }}
