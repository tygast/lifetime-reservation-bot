name: Life Time Reservation Bot
run-name: >-
  ${{
    github.event_name == 'schedule'
    && (
      github.event.schedule == '11 5 * * 0-4' && 'Scheduled (CT primary)'
      || github.event.schedule == '27 5 * * 0-4' && 'Scheduled (CT backup 1)'
      || github.event.schedule == '43 5 * * 0-4' && 'Scheduled (CT backup 2)'
      || github.event.schedule == '9 6 * * 0-4' && 'Scheduled (CT backup 3)'
      || github.event.schedule == '25 6 * * 0-4' && 'Scheduled (CT final backup)'
      || format('Scheduled ({0})', github.event.schedule)
    )
    || github.event_name == 'workflow_dispatch'
    && format('Manual ({0}, {1})', inputs.env, inputs.runner)
    || github.event_name
  }}

on:
  schedule:
    - cron: '11 5 * * 0-4'   # 5:11 AM CT primary — 4h49m buffer before 10 AM CT target
      timezone: 'America/Chicago'
    - cron: '27 5 * * 0-4'   # 5:27 AM CT backup 1 — 4h33m buffer before 10 AM CT target
      timezone: 'America/Chicago'
    - cron: '43 5 * * 0-4'   # 5:43 AM CT backup 2 — 4h17m buffer before 10 AM CT target
      timezone: 'America/Chicago'
    - cron: '9 6 * * 0-4'    # 6:09 AM CT backup 3 — 3h51m buffer before 10 AM CT target
      timezone: 'America/Chicago'
    - cron: '25 6 * * 0-4'   # 6:25 AM CT final backup — 3h35m buffer before 10 AM CT target
      timezone: 'America/Chicago'
  workflow_dispatch:  # Allows manual trigger
    inputs:
        env:
          description: "Environment to deploy in"
          required: true
          default: "dev"
          type: choice
          options:
            - dev
            - prod
        runner:
          description: "GitHub-hosted runner for manual runs"
          required: true
          default: "macos-latest"
          type: choice
          options:
            - macos-latest
            - ubuntu-latest
            - windows-latest

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      actions: read
    outputs:
      should_run: ${{ steps.duplicate-check.outputs.should_run }}
    steps:
      - name: Log workflow timing
        id: schedule-timing
        run: |
          CURRENT_LOCAL_DATE=$(TZ='America/Chicago' date '+%Y-%m-%d')
          CRON="${{ github.event.schedule }}"
          echo "=== Workflow Timing ==="
          echo "Cron trigger:       $CRON"
          echo "Actual start (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Actual start (CT):  $(TZ='America/Chicago' date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "======================"
          echo "current_local_date=$CURRENT_LOCAL_DATE" >> "$GITHUB_OUTPUT"

      - name: Skip duplicate scheduled run for the active Chicago day
        id: duplicate-check
        uses: actions/github-script@v8
        env:
          CURRENT_LOCAL_DATE: ${{ steps.schedule-timing.outputs.current_local_date }}
        with:
          script: |
            const runId = Number(process.env.GITHUB_RUN_ID);
            const currentLocalDate = process.env.CURRENT_LOCAL_DATE;

            const formatter = new Intl.DateTimeFormat("en-CA", {
              timeZone: "America/Chicago",
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
            });

            try {
              const response = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "bot.yml",
                event: "schedule",
                per_page: 100,
              });

              const runs = Array.isArray(response.data.workflow_runs)
                ? response.data.workflow_runs.filter(
                    (run) =>
                      run &&
                      typeof run.id === "number" &&
                      typeof run.created_at === "string"
                  )
                : [];

              const candidates = runs
                .filter((run) => run.id !== runId)
                .filter((run) => formatter.format(new Date(run.created_at)) === currentLocalDate)
                .sort((left, right) => {
                  return new Date(left.created_at) - new Date(right.created_at);
                });

              for (const run of candidates) {
                const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                  per_page: 100,
                });
                const jobs = Array.isArray(jobsResponse.data.jobs)
                  ? jobsResponse.data.jobs.filter(Boolean)
                  : [];
                const runBotJob = jobs.find((job) => job.name === "run-bot");
                if (!runBotJob) {
                  core.notice(
                    `Skipping duplicate scheduled run because ${run.display_title} ` +
                    `(#${run.id}) already exists for ${currentLocalDate}, but its ` +
                    `run-bot job is not visible yet.`
                  );
                  core.setOutput("should_run", "false");
                  return;
                }
                const isActive = runBotJob.status !== "completed";
                const isSuccessful = runBotJob.conclusion === "success";
                if (!isActive && !isSuccessful) {
                  continue;
                }
                core.notice(
                  `Skipping duplicate scheduled run because ${run.display_title} ` +
                  `(#${run.id}) has run-bot ${runBotJob.status}` +
                  `${runBotJob.conclusion ? `/${runBotJob.conclusion}` : ""} ` +
                  `for ${currentLocalDate}.`
                );
                core.setOutput("should_run", "false");
                return;
              }
            } catch (error) {
              core.warning(
                `Duplicate guard could not inspect existing workflow runs: ${error.message}`
              );
            }

            core.setOutput("should_run", "true");

  run-bot:
    runs-on: ${{ github.event_name == 'schedule' && 'macos-latest' || inputs.runner }}
    needs: check-schedule
    if: always() && (github.event_name != 'schedule' || needs.check-schedule.outputs.should_run == 'true')
    environment: ${{ github.event_name == 'schedule' && 'prod' || inputs.env }}
    steps:
      - name: Deploying in selected environment
        run: echo "Deploying in ${{ github.event_name == 'schedule' && 'prod' || inputs.env }} on ${{ github.event_name == 'schedule' && 'macos-latest' || inputs.runner }}"

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install Dependencies
        run: |
          uv pip install --system -e .

      - name: Run Lifetime Bot
        id: run-bot-step
        continue-on-error: true
        run: python -u -m lifetime_bot
        env:
          LIFETIME_USERNAME: ${{ secrets.LIFETIME_USERNAME }}
          LIFETIME_PASSWORD: ${{ secrets.LIFETIME_PASSWORD }}
          LIFETIME_CLUB_NAME: ${{ vars.LIFETIME_CLUB_NAME }}
          RUN_ON_SCHEDULE: ${{ vars.RUN_ON_SCHEDULE }}
          TARGET_CLASS: ${{ vars.TARGET_CLASS }}
          TARGET_INSTRUCTOR: ${{ vars.TARGET_INSTRUCTOR }}
          TARGET_DATE: ${{ vars.TARGET_DATE }}
          START_TIME: ${{ vars.START_TIME }}
          END_TIME: ${{ vars.END_TIME }}
          LIFETIME_BOT_INLINE_NOTIFICATIONS: "false"
          LIFETIME_BOT_RESULT_PATH: ${{ runner.temp }}/lifetime-bot-result.json
          TARGET_LOCAL_TIME: ${{ vars.TARGET_LOCAL_TIME }}
          TIMEZONE: ${{ vars.TIMEZONE }}

      - name: Ensure final result payload exists
        if: always()
        run: |
          if [ ! -f "$RESULT_PATH" ]; then
            printf '%s\n' \
              '{' \
              '  "success": false,' \
              '  "subject": "Lifetime Bot - All Attempts Failed",' \
              '  "body": "Failed to reserve class. The run ended before a final result payload was generated."' \
              '}' > "$RESULT_PATH"
          fi
        env:
          RESULT_PATH: ${{ runner.temp }}/lifetime-bot-result.json

      - name: Upload bot result payload
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lifetime-bot-result
          path: ${{ runner.temp }}/lifetime-bot-result.json

      - name: Summarize reservation result
        if: always()
        run: python -m lifetime_bot.notify_result --summary-only "${{ runner.temp }}/lifetime-bot-result.json"

      - name: Finalize bot job status
        if: steps.run-bot-step.outcome == 'failure'
        run: exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [check-schedule, run-bot]
    if: always() && needs.run-bot.result != 'skipped' && (github.event_name != 'schedule' || needs.check-schedule.outputs.should_run == 'true')
    environment: ${{ github.event_name == 'schedule' && 'prod' || inputs.env }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install Dependencies
        run: |
          uv pip install --system -e .

      - name: Download bot result payload
        uses: actions/download-artifact@v8
        with:
          name: lifetime-bot-result
          path: ${{ runner.temp }}

      - name: Send final notification
        id: send-final-notification
        continue-on-error: true
        run: python -m lifetime_bot.notify_result "${{ runner.temp }}/lifetime-bot-result.json"
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          NOTIFICATION_METHOD: ${{ vars.NOTIFICATION_METHOD }}
          NOTIFICATION_TIMEOUT_SECONDS: ${{ vars.NOTIFICATION_TIMEOUT_SECONDS }}
          SMTP_TIMEOUT_SECONDS: ${{ vars.SMTP_TIMEOUT_SECONDS }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          SMS_NUMBER: ${{ secrets.SMS_NUMBER }}

      - name: Report notification delivery outcome
        if: always()
        run: |
          echo "Notification delivery step outcome: $NOTIFY_OUTCOME"
          if [ "$NOTIFY_OUTCOME" != "success" ]; then
            echo "::warning::Final notification delivery did not complete. Review the reservation summary above for the actual reservation outcome."
          fi
        env:
          NOTIFY_OUTCOME: ${{ steps.send-final-notification.outcome }}
